<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit a product review with rating, installation date, features, and optional comments.">
  <meta name="author" content="Pablo Hinojosa">
  <title>W05 Product Review Form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/form.css">

  <script src="scripts/form.js" defer></script>
  <script src="scripts/getdates.js" defer></script>
</head>

<body>
  <header>
    <h1>Product Review</h1>
  </header>

  <main>
    <form method="get" action="review.html" class="review-form">

     
      <div class="form-group">
        <label for="productName">
          Product Name <span class="required">*</span>
        </label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

    
      <fieldset class="form-group">
        <legend>Overall Rating <span class="required">*</span></legend>

        <div class="rating-group">
          <input type="radio" id="rating1" name="rating" value="1" required>
          <label for="rating1">☆</label>

          <input type="radio" id="rating2" name="rating" value="2" required>
          <label for="rating2">☆☆</label>

          <input type="radio" id="rating3" name="rating" value="3" required>
          <label for="rating3">☆☆☆</label>

          <input type="radio" id="rating4" name="rating" value="4" required>
          <label for="rating4">☆☆☆☆</label>

          <input type="radio" id="rating5" name="rating" value="5" required>
          <label for="rating5">☆☆☆☆☆</label>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="installDate">
          Date of Installation <span class="required">*</span>
        </label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

    
      <fieldset class="form-group">
        <legend>Useful Features</legend>
        <p class="helper">(Check all that apply)</p>

        <div class="checkbox-group">
          <input type="checkbox" id="durability" name="features" value="durability">
          <label for="durability">Durability</label>

          <input type="checkbox" id="easeOfUse" name="features" value="easeOfUse">
          <label for="easeOfUse">Ease of Use</label>

          <input type="checkbox" id="performance" name="features" value="performance">
          <label for="performance">Performance</label>

          <input type="checkbox" id="design" name="features" value="design">
          <label for="design">Design</label>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="writtenReview">Written Review</label>
        <textarea id="writtenReview" name="writtenReview" rows="6"></textarea>
      </div>

      <div class="form-group">
        <label for="userName">Your Name</label>
        <input type="text" id="userName" name="userName">
      </div>

      <div class="form-group">
        <input type="submit" value="Post Review" class="submit-btn">
      </div>

    </form>
  </main>
  <footer>
    <p>&copy; 2026 Pablo Hinojosa | WDD 131 | BYU Idaho 😎</p>
    <p>Last Modification: <span id="lastModified"></span></p>
  </footer>
</body>
</html>
